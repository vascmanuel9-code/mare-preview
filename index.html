<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CINE LIVRE</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}body{background:#141414;color:#fff;font-family:Arial}
    header{display:flex;justify-content:space-between;align-items:center;padding:15px 40px;background:#000;position:fixed;width:100%;z-index:100}
   .logo{color:#e50914;font-size:28px;font-weight:bold}#busca{padding:10px;width:250px;background:#333;border:none;border-radius:6px;color:#fff}
   .banner{height:90vh;background-size:cover;background-position:center;display:flex;align-items:flex-end;padding:0 50px 80px}
   .banner-info h1{font-size:50px;margin-bottom:10px;text-shadow:2px 2px 4px #000}
   .categoria{padding:30px 40px;margin-top:50px}.lista-filmes{display:flex;gap:12px;overflow-x:auto}
   .card-filme{min-width:180px;cursor:pointer;transition:0.3s}.card-filme:hover{transform:scale(1.08)}
   .card-filme img{width:100%;border-radius:8px}
   .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:200;overflow-y:auto}
   .modal-conteudo{max-width:900px;margin:50px auto;background:#181818;border-radius:10px;padding:20px}
   .modal-fechar{float:right;font-size:30px;cursor:pointer}
   .modal-info{display:flex;gap:20px;flex-wrap:wrap}.modal-info img{width:300px;border-radius:10px}
   .btn{background:#e50914;color:#fff;padding:12px 25px;border:none;border-radius:6px;font-size:18px;cursor:pointer;margin:10px 5px 0 0;display:inline-block}
   .btn:hover{background:#f6121d}.btn2{background:#333}
  </style>
</head>
<body>
  <header><div class="logo">CINE LIVRE</div><input type="text" id="busca" placeholder="🔎 Buscar..."></header>
  <section class="banner" id="banner"><div class="banner-info" id="banner-info"></div></section>
  <main>
    <section class="categoria"><h2>Lançamentos</h2><div class="lista-filmes" id="lancamentos"></div></section>
    <section class="categoria"><h2>Populares</h2><div class="lista-filmes" id="populares"></div></section>
    <section class="categoria"><h2>Mais Votados</h2><div class="lista-filmes" id="top"></div></section>
  </main>
  <div class="modal" id="modal"><div class="modal-conteudo"><span class="modal-fechar" onclick="fecharModal()">&times;</span><div class="modal-info" id="modal-info"></div></div></div>

  <script>
    const API_KEY = "251ab326b041f1ccd4bfa4c407cd2940";
    const BASE_URL = "https://api.themoviedb.org/3";
    const IMG_URL = "https://image.tmdb.org/t/p/w500";
    async function pegarFilmes(url){const res=await fetch(url);const data=await res.json();return data.results}
    async function carregarBanner(){const filmes=await pegarFilmes(`${BASE_URL}/movie/popular?api_key=${API_KEY}&language=pt-BR`);const filme=filmes[0];document.getElementById('banner').style.backgroundImage=`url(${IMG_URL}${filme.backdrop_path})`;document.getElementById('banner-info').innerHTML=`<h1>${filme.title}</h1><p>${filme.overview.substring(0,180)}...</p><button class="btn" onclick="abrirModal(${filme.id})">▶ Ver Detalhes</button>`}
    function mostrarFilmes(filmes,id){document.getElementById(id).innerHTML=filmes.map(f=>`<div class="card-filme" onclick="abrirModal(${f.id})"><img src="${IMG_URL}${f.poster_path}"><p>${f.title}</p></div>`).join('')}
    async function abrirModal(id){
      const res=await fetch(`${BASE_URL}/movie/${id}?api_key=${API_KEY}&language=pt-BR&append_to_response=videos`);
      const filme=await res.json();
      const trailer=filme.videos.results.find(v=>v.type==="Trailer"&&v.site==="YouTube");
      const linkTrailer=trailer?`https://www.youtube.com/watch?v=${trailer.key}`:"#";
      // AQUI É ONDE TU COLA O LINK DO FILME
      const linkFilme = "COLA_O_LINK_DO_FILME_AQUI"; 
      document.getElementById('modal-info').innerHTML=`<img src="${IMG_URL}${filme.poster_path}"><div><h1>${filme.title}</h1><p><b>Avaliação:</b> ${filme.vote_average} ⭐</p><p><b>Data:</b> ${filme.release_date}</p><p>${filme.overview}</p><button class="btn" onclick="window.open('${linkFilme}', '_blank')">▶ Assistir Agora</button><button class="btn btn2" onclick="window.open('${linkTrailer}', '_blank')">▶ Ver Trailer</button></div>`;
      document.getElementById('modal').style.display='block';
    }
    function fecharModal(){document.getElementById('modal').style.display='none'}
    async function carregarTudo(){const lanc=await pegarFilmes(`${BASE_URL}/movie/now_playing?api_key=${API_KEY}&language=pt-BR`);const pop=await pegarFilmes(`${BASE_URL}/movie/popular?api_key=${API_KEY}&language=pt-BR`);const top=await pegarFilmes(`${BASE_URL}/movie/top_rated?api_key=${API_KEY}&language=pt-BR`);mostrarFilmes(lanc,'lancamentos');mostrarFilmes(pop,'populares');mostrarFilmes(top,'top')}
    document.getElementById('busca').addEventListener('input',async(e)=>{const termo=e.target.value;if(termo.length>2){const resultados=await pegarFilmes(`${BASE_URL}/search/movie?api_key=${API_KEY}&query=${termo}&language=pt-BR`);mostrarFilmes(resultados,'populares')}if(termo.length==0)carregarTudo()});
    carregarBanner();carregarTudo();
  </script>
</body>
</html>
