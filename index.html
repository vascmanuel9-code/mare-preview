<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CINE LIVRE</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0B0B0B;color:#fff;font-family:'Segoe UI',Arial}
header{position:fixed;top:0;width:100%;padding:15px 4%;background:linear-gradient(180deg,rgba(0,0,0,0.9)0%,transparent 100%);display:flex;align-items:center;gap:20px;z-index:100}
header h1{color:#E50914;font-size:24px;font-weight:900}
nav{display:flex;gap:15px}
nav button{background:none;border:none;color:#fff;font-size:14px;cursor:pointer;opacity:0.8}
nav button:hover{opacity:1}
.banner{height:70vh;background-size:cover;background-position:center;display:flex;align-items:flex-end;padding:4%;background-image:linear-gradient(to top, #0B0B0B 10%, transparent 90%)}
.banner-info h2{font-size:3vw;margin-bottom:10px}
.banner-info p{width:40%;font-size:1.2vw;margin-bottom:20px}
.btn-play{padding:10px 25px;background:#fff;color:#000;border:none;border-radius:4px;font-size:16px;font-weight:bold;cursor:pointer}
.row{padding:20px 4%;margin-top:60px}
.row h3{margin-bottom:10px;font-size:18px}
.lista-row{display:flex;gap:8px;overflow-x:auto;scroll-behavior:smooth}
.lista-row::-webkit-scrollbar{display:none}
.card{min-width:180px;transition:0.3s;cursor:pointer}
.card:hover{transform:scale(1.1);z-index:10}
.card img{width:100%;border-radius:4px}
#player{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;z-index:200;display:none;flex-direction:column}
#player button{margin:15px;background:#333;color:#fff;border:none;padding:10px 20px;border-radius:4px;width:120px}
#player iframe{flex:1;border:none}
</style>
</head>
<body>

<header>
<h1>CINE LIVRE</h1>
<nav>
<button onclick="carregar('popular')">Início</button>
<button onclick="carregar('top_rated')">Top 10</button>
<button onclick="carregar('upcoming')">Lançamentos</button>
</nav>
</header>

<div class="banner" id="banner">
<div class="banner-info">
<h2 id="bannerTitulo">CINE LIVRE</h2>
<p id="bannerDesc">Busque milhares de filmes e assista online</p>
<button class="btn-play" onclick="assistirBanner()">▶ Assistir</button>
</div>
</div>

<div class="row">
<h3>Em Alta</h3>
<div class="lista-row" id="listaPopular"></div>
</div>

<div class="row">
<h3>Top Avaliados</h3>
<div class="lista-row" id="listaTop_rated"></div>
</div>

<div id="player">
<button onclick="voltar()">⬅ Voltar</button>
<iframe id="iframePlayer" allowfullscreen></iframe>
</div>

<script>
const API_KEY="251ab326b041f1ccd4bfa4c407cd2940";
const IMG="https://image.tmdb.org/t/p/w500";
let filmeBanner = null;

async function carregar(tipo){
const res=await fetch(`https://api.themoviedb.org/3/movie/${tipo}?api_key=${API_KEY}&language=pt-BR`);
const data=await res.json();
mostrarLinha(data.results, tipo);

if(tipo==='popular' && data.results[0]){
filmeBanner = data.results[0];
document.getElementById('banner').style.backgroundImage=`linear-gradient(to right, rgba(11,11,11,0.8) 0%, transparent 60%), url(${IMG}${filmeBanner.backdrop_path})`;
document.getElementById('bannerTitulo').innerText=filmeBanner.title;
document.getElementById('bannerDesc').innerText=filmeBanner.overview.substring(0,150)+"...";
}
}

function mostrarLinha(filmes, id){
let html="";
filmes.forEach(f=>{
if(!f.poster_path)return;
html+=`<div class="card" onclick="assistir(${f.id})"><img src="${IMG}${f.poster_path}"></div>`
});
document.getElementById('lista'+id.charAt(0).toUpperCase()+id.slice(1)).innerHTML=html;
}

function assistir(id){
document.getElementById('player').style.display="flex";
// PLAYER NOVO - VIDAPI
document.getElementById('iframePlayer').src=`https://vidapi.xyz/embed/movie/${id}`;
document.body.style.overflow="hidden";
}

function assistirBanner(){
if(filmeBanner) assistir(filmeBanner.id)
}

function voltar(){
document.getElementById('player').style.display="none";
document.getElementById('iframePlayer').src="";
document.body.style.overflow="auto";
}

// Carregar ao iniciar
carregar('popular');
carregar('top_rated');
</script>
</body>
</html>
